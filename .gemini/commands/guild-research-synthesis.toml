description = "Synthesize research data into themes, insights, and recommendations"
prompt = """
IT IS CRITICAL THAT YOU FOLLOW THIS COMMAND IN ORDER.

## STEP 1 — SYNTHESIZE (Ranger)

LOAD the FULL {project-root}/_bmad/guild/agents/ranger.md, READ its entire contents, activate as the Ranger UX Researcher agent, then immediately execute menu item "RS" — Synthesize research data into themes, insights, and recommendations.

## STEP 2 — EMIT THE TRACEABILITY SPINE

Alongside the prose synthesis, emit/update the spine at `{output_root}/guild-artifacts/spine.json` (schema: `docs/guild/spine-schema.yaml`): every research nugget is a typed node (`experiment -> fact -> insight -> conclusion`), facts carry real citations and a verified flag, and every insight/conclusion lists the nugget IDs it `derived_from`. A synthesis without a spine is prose, not research.

## STEP 3 — RESEARCH GATES (scripted, BLOCKING)

Run all three on the spine (use the global install path; fall back to `scripts/` if absent):

```
python3 ~/.claude/guild/scripts/spine.py --spine {output_root}/guild-artifacts/spine.json
python3 ~/.claude/guild/scripts/verification-gate.py --spine {output_root}/guild-artifacts/spine.json
python3 ~/.claude/guild/scripts/confidence-gate.py --spine {output_root}/guild-artifacts/spine.json
```

ENFORCE THE EXIT CODES — this is NOT a judgment call:
- **spine.py non-zero:** the lineage is malformed (orphans, cycles, uncited facts). Fix the spine, re-run.
- **verification-gate non-zero:** uncited facts, laundered stats, or opinion-as-fact (sycophancy firewall). Fix or strip the offending nuggets — do NOT soften the finding into prose — then re-run until 0.
- **confidence-gate non-zero:** low-confidence conclusions exist. They may NOT silently drive the build queue: mark each one ASSUMPTION in the synthesis doc, then re-run with them flagged.

Report the gate results (counts + any assumptions now riding) to the user with the synthesis.
"""
