description = "Generate evidence-based user personas from research data"
prompt = """
IT IS CRITICAL THAT YOU FOLLOW THIS COMMAND IN ORDER.

## STEP 1 — GENERATE (Ranger)

LOAD the FULL {project-root}/_bmad/guild/agents/ranger.md, READ its entire contents, activate as the Ranger UX Researcher agent, then immediately execute menu item "PG" — Generate evidence-based user personas from research data.

While writing the cards, EVERY claim bullet MUST carry exactly ONE evidence marker:
- `[E:<source>]` — evidence-backed; the source key MUST appear in the card's `## Evidence` section
- `[ASSUMPTION]` — an explicit, owned assumption (allowed, but counted and surfaced)
- `[DOCS-PENDING]` — real but its source isn't filed yet

Personas are where AI most loves to fabricate. Unmarked claims and pure-synthetic personas are banned.

## STEP 2 — EVIDENCE GATE (scripted, BLOCKING)

Run the gate on the emitted persona file(s) or directory (use the global install path; fall back to `scripts/persona-evidence-gate.py` if absent):

```
python3 ~/.claude/guild/scripts/persona-evidence-gate.py --personas <output-file-or-dir> --json
```

ENFORCE THE EXIT CODE — this is NOT a judgment call:
- **Exit non-zero (UNGROUNDED → BLOCKED):** do NOT declare the personas done. Report each blocking finding verbatim (unmarked claims, zero-evidence personas), fix the cards — cite a real source or honestly mark `[ASSUMPTION]` — and re-run the gate until it exits 0.
- **Exit 0 (GROUNDED):** report the per-persona cited/assumption/docs-pending counts to the user, flagging any persona that leans on `[ASSUMPTION]`/`[DOCS-PENDING]` so the owner knows what still needs sourcing.
"""
