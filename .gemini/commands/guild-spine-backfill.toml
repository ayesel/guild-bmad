description = "Backfill a traceability spine from legacy research artifacts (projects whose research predates GUILD-63), then gate it"
prompt = """
IT IS CRITICAL THAT YOU FOLLOW THIS COMMAND IN ORDER. This is for LEGACY projects — real research exists (research.md, synthesis docs, interview notes, personas) but predates the spine schema, so the IA/verification gates have nothing to run on.

## STEP 1 — INVENTORY THE REAL EVIDENCE (Ranger)

LOAD the FULL {project-root}/_bmad/guild/agents/ranger.md, READ its entire contents, and activate as the Ranger UX Researcher agent. Inventory the project's REAL research artifacts: `{output_root}/research.md`, `{output_root}/guild-artifacts/research-synthesis-*.md`, interview/call notes, owner design-direction answers, desk-research sweeps. List each with what it actually is (web-verified desk research / recorded interview / synthesis / owner interview). If NOTHING real exists, STOP and say so — a spine cannot be backfilled from vibes.

## STEP 2 — BUILD THE SPINE (honest extraction, never invention)

Write `{output_root}/guild-artifacts/spine.json` per `docs/guild/spine-schema.yaml`. Model each real research EVENT as an `experiment` node. Extract `fact` nuggets ONLY for claims LITERALLY stated in a source (citation = source doc + section, including the evidence kind — "research", "interview", "observation", "analytics"; `verified: true` only because you read it there). Facts must be observations (no opinion words); quantitative words require a digit in the same string. Then `insight` nuggets (each `derived_from` ≥1 fact) and `conclusion` nuggets (≥1 insight). RULES OF HONESTY: cut what you cannot ground; encode known limitations as facts (e.g. "personas are brainstorm-derived, no primary user research was conducted — [source]"); NEVER fabricate constraints/ACs/ADRs — downstream artifacts attach those later.

## STEP 3 — GATE IT (scripted, BLOCKING)

Run all four (global install path first; fall back to `scripts/`):

```
python3 ~/.claude/guild/scripts/spine.py --spine {output_root}/guild-artifacts/spine.json
python3 ~/.claude/guild/scripts/verification-gate.py --spine {output_root}/guild-artifacts/spine.json
python3 ~/.claude/guild/scripts/confidence-gate.py --spine {output_root}/guild-artifacts/spine.json
python3 ~/.claude/guild/scripts/ia-evidence-guard.py --spine {output_root}/guild-artifacts/spine.json
```

ENFORCE THE EXIT CODES — fix or cut nuggets until all four exit 0; NEVER fake a citation or verified flag to pass. Report to the user: nugget counts by type, the four exit codes, per-conclusion confidence, and everything you cut for honesty (the cuts are findings, not noise). From this point the project's IA work traces to the spine like any post-GUILD-63 project.
"""
