# Run manifest schema (GUILD-19). Every autonomous / background run writes
# {output_root}/guild-artifacts/runs/RUN-<id>.yaml IN THE CONSUMING PROJECT —
# portable (survives outside atrium) AND renders as an atrium task (live
# monitor + steer). Pairs with GUILD-2 (loop) + GUILD-3 (autonomy tiers).
#
# ENGINE/CLIENT SEPARATION (non-negotiable — GUILD is a product): run records
# contain client project content, so they live CLIENT-SIDE in the consuming
# workspace with the project's other artifacts. This engine repo keeps ONLY
# this schema. NEVER commit a real RUN-*.yaml, client spine, or client
# persona/artifact into the engine repo.

run_schema:
  run_id: "RUN-YYYY-MM-DD-NNN"
  objective: ""
  charter_ref: "{output_root}/guild-artifacts/raid-charter.yaml"   # GUILD-11
  agent_roster: []
  linked:
    epic_id: null
    story_ids: []
    artifact_ids: []
  trace_uri: null
  checkpoints: []
  open_exceptions: []           # parked decisions (trust.yaml exception_queue)
  output_manifest: []           # artifact_ids produced this run
  next_action: ""
  state: queued

states: [queued, context-loading, planning, working, self-reviewing, blocked-needs-human, repairing, ready-for-review, handoff-ready, completed, failed, superseded]

# Steering actions (Codex-app turn_steer pattern) — each gated by trust.yaml tiers.
steering: [continue-with-default, answer-exception, pause, resume, cancel, fork-candidate, promote-version, bind-to-story, request-repair, send-to-BMAD]

atrium_render: "each run also renders as an atrium task — live monitor + interrupt"
find_by_artifact: "artifacts.yaml source_run_id -> docs/guild/runs/RUN-*.yaml (find the run that produced any artifact)"
