# Fresh + Valid scoring (GUILD-24). Score novelty ONLY among candidates that
# already pass quality — otherwise the system rewards weird-but-unusable output.
# Two stages: a hard validity FLOOR, then a ranked Fresh+Valid score. Selection
# is multi-judge Pareto (no single judge dominates).

# Stage 1 — validity floor (pass/fail; a fail is DISCARDED, never scored):
validity_floor:
  - wcag_aa                 # contrast + a11y semantics
  - ds_tokens               # tokens only, no hardcoded values
  - component_api_feasible  # implementable with the DS components
  - state_coverage          # empty/loading/error/etc per definition-of-done
  - responsive              # 375/768/1440
  - convention_fit          # honors locked fields (novelty-zones.yaml)

# Stage 2 — TWO INDEPENDENT AXES (GUILD-41). NEVER collapse to one scalar (Goodhart).
# The old single-number blend (novelty .35/useful .25/brand .20/feasible .20) is
# SUPERSEDED: it let the median-safe candidate win and averaged the bold one away.
axes:
  quality: "diverse-vendor jury Bradley-Terry strength (GUILD-40 / jury.yaml)"  # cross-vendor, generator-excluded
  novelty: "distance from baseline-patterns.yaml + spread across the surviving pool"
selection: >
  Pareto front on quality × novelty (scripts/pareto-select.py): a balanced rec + the
  bold high-novelty alternatives, distinctive weighted UP. Validity floor first; no
  candidate selectable on novelty alone; nothing collapsed to one scalar.
penalties:
  too_generic: -0.25              # NOVELTY axis — too close to baseline-patterns.yaml
  novelty_in_locked_zone: -0.50   # from novelty-zones.yaml

# Personas are DIVERSITY/routing lenses, NOT the correctness judges (persona ≠
# correctness). The cross-vendor jury (GUILD-40) is the actual quality scorer.
personas_as_lenses: { mage: distinctiveness, sage: usability-risk, tinker: feasibility }
