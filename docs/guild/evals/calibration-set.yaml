# GUILD-44 — Judge calibration set (owner pairwise design judgments = golden set).
# The jury (GUILD-40) is scored AGAINST these: judge-vs-owner agreement should RISE,
# the offline-online gap should SHRINK. The jury is a SCREEN; the owner is ground truth.
meta:
  target_labels: 50            # gather ~50-100 owner pairwise labels over time
  accuracy_bar: 0.70           # below this, jury is advisory-only (may not gate)
  gather_via: dashboard        # owner labels a pair at a time (RENDERED pick notes)

# GUILD-79: the prior CAL-1/CAL-2 picks were made on FILENAMES (the owner could not see
# the actual designs) -> INVALIDATED. Re-collecting from RENDERED pick notes (each design
# embedded as a live iframe) so labels reflect real VISUAL taste, not filename guesses.
labels: []

# Real-signal winners (A/B test / HEART proxy) for the offline-online gap meta-metric.
online_winners: []
