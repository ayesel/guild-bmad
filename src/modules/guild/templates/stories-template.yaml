# Stories Template (Standalone)
#
# Generate developer stories from design artifacts.
# Standard format — works without BMAD. Used when bmad_mode = false.
# For BMAD projects, use jira-stories-template.yaml instead.

template:
  name: Developer Story
  artifact_type: story
  output_file: "{output_root}/implementation-artifacts/stories/{epic}-{story}-{slug}.md"

structure:
  story_format: |
    # Story {epic}.{story}: {title}

    ## Story

    **As a** {persona},
    **I want to** {action},
    **So that** {outcome}.

    {description — 2-3 sentences of context about what this story delivers and why it matters}

    ## Acceptance Criteria

    {Use strict BDD format — Given/When/Then}

    1. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    2. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    3. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    {Include error/edge case ACs:}

    4. **Given** {error condition}
       **When** {action}
       **Then** {error handling behavior}

    ## Tasks / Subtasks

    {Checkbox format with AC references}

    - [ ] {Task 1 description} (AC: 1)
    - [ ] {Task 2 description} (AC: 1, 2)
    - [ ] {Task 3 description} (AC: 3)
    - [ ] {Task 4 description} (AC: 4)
    - [ ] Write/update tests for acceptance criteria
    - [ ] Manual QA verification

    ## Dev Notes

    {Technical implementation guidance}

    ### Project Structure Notes

    {Where new files should go, what existing files to modify}

    - New files: {list of files to create with paths}
    - Modified files: {list of existing files that need changes}
    - Test files: {list of test files to create/update}

    ### References

    {Links to design artifacts and related stories}

    - Guild Design Artifacts:
      - {path to user flow if relevant}
      - {path to wireframe if relevant}
      - {path to component spec if relevant}
    - Design Tokens: {path to tokens file if new tokens needed}
    - Related Stories: {list of related/dependent story IDs}

  formatting_rules:
    - "Acceptance Criteria MUST use strict BDD format: Given/When/Then"
    - "Do NOT use named ACs like '1. **AC1 — Name**:' — use numbered Given/When/Then only"
    - "ALWAYS include Project Structure Notes and References in Dev Notes"
    - "Tasks MUST reference which AC they satisfy in parentheses"
    - "Filenames MUST follow {epic}-{story}-{slug}.md pattern"
