# State Diagram Template
#
# Maps all states, transitions, and conditions for a component or feature.

template:
  name: State Diagram
  artifact_type: state-diagram
  output_file: "{output_root}/guild-artifacts/state-diagram-{feature-name}.md"

structure:
  header:
    - artifact: "State Diagram"
    - feature: "{feature-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Rogue (Interaction Designer)"

  sections:
    - name: "Overview"
      description: >
        What component/feature is this state diagram for?
        Why is state management important for this element?

    - name: "State Diagram"
      format: |
        ```mermaid
        stateDiagram-v2
            [*] --> Empty
            Empty --> Loading : User triggers action
            Loading --> Populated : Data received
            Loading --> Error : Request fails
            Error --> Loading : User retries
            Populated --> Updating : User edits
            Updating --> Populated : Save success
            Updating --> Error : Save fails
            Populated --> [*] : User exits
        ```

    - name: "State Definitions"
      description: >
        For each state, document:
        | State | Description | Visual Treatment | User Can Do | System Is Doing |

    - name: "Transitions"
      description: >
        For each transition:
        | From | To | Trigger | Guard Condition | Action | Duration |

    - name: "Interaction Contract (REQUIRED — gates parse this)"
      description: >
        Per docs/guild/decisions/interaction-factors-research.md §4: every
        reachable state pair MUST carry a complete contract. A blank field is
        an artifact-time defect; a built transition contradicting its declared
        field fails the transition-coverage diff. Emit as a fenced yaml block
        so interaction-gate/coverage tooling can parse it.
      format: |
        ```yaml
        interaction_contract:
          - pair: Empty -> Loading
            transition:                 # motion OR cut — never blank
              motion:
                pattern: fade-through   # container-transform | shared-axis | fade-through | fade
                duration_token: motion.short
                easing_token: ease-enter
                reduced_motion_variant: opacity-swap   # must preserve feedback, never delete it
            feedback: { channel: visual, latency_budget_ms: 100 }
            reversibility: reversible   # reversible | soft-reversible (+undo_window_ms, undo_action_id) | irreversible (+confirm_gate)
            focus_handoff: "#results-heading"
            interruptible: true         # required true for standard transitions
            modality_parity:
              keyboard: Enter
              single_pointer_alternative: tap
              hover_degradation: n/a
        ```

    - name: "State Content Specs"
      description: >
        What the user sees in each state:
        - Empty: illustration, message, CTA
        - Loading: skeleton/spinner, estimated time
        - Populated: data layout, available actions
        - Error: error message, recovery actions, support link
        - Disabled: visual treatment, tooltip explaining why
        - Partial: what's shown vs hidden, progressive disclosure

    - name: "Accessibility Per State"
      description: >
        ARIA attributes and announcements for each state transition:
        | Transition | Screen Reader Announcement | Focus Management | Live Region |

    - name: "Next Steps"
      description: >
        Typically: wireframes showing each state visually,
        or interaction maps for states with complex behaviors.
