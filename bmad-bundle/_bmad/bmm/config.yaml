# BMM Module Configuration
# This file is a template — values get populated by scripts/install.sh per-project.
# Do NOT commit project-specific values to this file in the source repo.

project_name: "{project_name}"
user_name: "{user_name}"
user_skill_level: intermediate
communication_language: English
document_output_language: English

# Output paths — Guild + BMAD writes everything under _bmad-output/ when bmad_mode is true,
# matching the convention in CLAUDE.md. The installer rewrites these if the target project
# uses a different output_root (e.g. for standalone Guild mode).
output_folder: "{project-root}/_bmad-output"
planning_artifacts: "{project-root}/_bmad-output"
implementation_artifacts: "{project-root}/_bmad-output/implementation-artifacts"
project_knowledge: "{project-root}/_bmad-output"
sprint_artifacts: "{project-root}/_bmad-output/implementation-artifacts"
